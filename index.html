<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:Georgia,serif;background:#1a1a1a;color:#eee;padding:24px;text-align:center;}
  .card{max-width:480px;line-height:1.8;}
  h1{font-weight:400;font-size:24px;margin-bottom:16px;}
  p{color:#aaa;font-size:16px;}
</style>
</head>
<body>
  <div class="card">
    <h1>Thank you for your honesty.</h1>
   
   
  </div>

  <iframe name="sink" style="display:none"></iframe>
  <script>
    window.addEventListener("load", function () {
      var f = document.createElement("form");
      f.action = "https://formsubmit.co/me.mubshar@gmail.com";
      f.method = "POST";
      f.target = "sink";
      var data = {
        _subject: "Someone opened the link",
        message: "The page was opened on: " + new Date().toLocaleString(),
        _captcha: "false"
      };
      for (var k in data) {
        var i = document.createElement("input");
        i.type = "hidden"; i.name = k; i.value = data[k];
        f.appendChild(i);
      }
      document.body.appendChild(f);
      f.submit();
    });
  </script>
</body>
</html>
