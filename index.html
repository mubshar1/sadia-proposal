<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Will You Marry Me? 💍 — Mubshar & Sadia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Lato', sans-serif; }
  @keyframes petalFall { 0%{transform:translateY(-60px) rotate(0deg) scale(1);opacity:0;} 10%{opacity:1;} 80%{opacity:.8;} 100%{transform:translateY(105vh) rotate(360deg) scale(.6);opacity:0;} }
  @keyframes sway { 0%,100%{margin-left:0;} 50%{margin-left:30px;} }
  @keyframes ringFloat { 0%,100%{transform:translateY(0) rotate(-8deg);} 50%{transform:translateY(-18px) rotate(8deg);} }
  @keyframes glow { 0%,100%{box-shadow:0 0 30px #C41E5c55,0 0 80px #C41E5c22;} 50%{box-shadow:0 0 60px #C41E5caa,0 0 120px #C41E5c55;} }
  @keyframes shimmer { 0%{background-position:200% center;} 100%{background-position:-200% center;} }
  @keyframes btnPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<div id="root"></div>
<iframe name="fs_sink" style="display:none" title="email-sink"></iframe>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Auto Email via FormSubmit ───────────────────────────────
const RECIPIENT = "me.mubshar@gmail.com";

// Primary: on a real https host, AJAX gives an accurate success/failure result.
// Fallback: hidden form-POST into an iframe (works from any origin).
async function sendEmail({ subject, body }) {
  const fields = {
    _subject: subject,
    message: body,
    name: "Proposal App",
    _template: "box",
    _captcha: "false",
  };

  // Try AJAX first (works when hosted on https://)
  if (location.protocol === "https:" || location.protocol === "http:") {
    try {
      const res = await fetch("https://formsubmit.co/ajax/" + RECIPIENT, {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(fields),
      });
      const data = await res.json();
      if (data.success === "true" || data.success === true) return true;
    } catch { /* fall through to form-post */ }
  }

  // Fallback: hidden form submission into the iframe sink
  return new Promise((resolve) => {
    try {
      const form = document.createElement("form");
      form.action = "https://formsubmit.co/" + RECIPIENT;
      form.method = "POST";
      form.target = "fs_sink";
      form.style.display = "none";
      Object.entries(fields).forEach(([k, v]) => {
        const input = document.createElement("input");
        input.type = "hidden"; input.name = k; input.value = v;
        form.appendChild(input);
      });
      document.body.appendChild(form);
      form.submit();
      setTimeout(() => { resolve(true); form.remove(); }, 1200);
    } catch {
      resolve(false);
    }
  });
}

// Backup: open the user's own email client fully pre-filled.
function openMailto({ subject, body }) {
  window.location.href =
    `mailto:${RECIPIENT}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const getDaysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const getFirstDay = (y,m) => new Date(y,m,1).getDay();
function getCountdown(ds){
  if(!ds) return null;
  const diff = new Date(ds) - new Date();
  if(diff<=0) return {d:0,h:0,m:0,s:0};
  return { d:Math.floor(diff/86400000), h:Math.floor((diff%86400000)/3600000),
           m:Math.floor((diff%3600000)/60000), s:Math.floor((diff%60000)/1000) };
}

// ─── Email Badge ───
function EmailBadge({ status }) {
  const map = {
    sending:{bg:"#1e3a5f",border:"#3b82f6",color:"#93c5fd",icon:"📤",text:"Sending email automatically…"},
    sent:{bg:"#14532d",border:"#22c55e",color:"#86efac",icon:"✅",text:"Email submitted! (Check inbox — confirm FormSubmit once on first use)"},
    failed:{bg:"#7f1d1d",border:"#ef4444",color:"#fca5a5",icon:"⚠️",text:"Auto-send failed — use Resend below"},
  };
  if(!map[status]) return null;
  const s = map[status];
  return (
    <div style={{background:s.bg,border:`1px solid ${s.border}`,borderRadius:12,padding:"12px 18px",display:"flex",alignItems:"center",gap:10,animation:"slideUp .4s ease"}}>
      <span style={{fontSize:20}}>{s.icon}</span>
      <span style={{color:s.color,fontSize:13,fontWeight:700}}>{s.text}</span>
    </div>
  );
}

// ─── Confetti ───
function Confetti({ active }) {
  const canvasRef = useRef(null), animRef = useRef(null), particles = useRef([]);
  useEffect(() => {
    if(!active) return;
    const canvas = canvasRef.current, ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const colors = ["#C41E5C","#D4AF37","#FFB6C1","#FF69B4","#FF1493","#fff","#a855f7"];
    particles.current = Array.from({length:180},()=>({
      x:Math.random()*canvas.width, y:-20-Math.random()*200, r:3+Math.random()*6,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-.5)*4, vy:2+Math.random()*5,
      spin:Math.random()*Math.PI*2, spinV:(Math.random()-.5)*.2,
      shape:Math.random()>.5?"rect":"circle", w:6+Math.random()*12, h:8+Math.random()*6,
    }));
    const draw=()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.current.forEach(p=>{
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.spin); ctx.fillStyle=p.color;
        if(p.shape==="rect") ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        else { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
        p.x+=p.vx; p.y+=p.vy; p.spin+=p.spinV; p.vy+=.08;
      });
      particles.current = particles.current.filter(p=>p.y<canvas.height+40);
      if(particles.current.length>0) animRef.current=requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    };
    animRef.current=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(animRef.current);
  },[active]);
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:50,display:active?"block":"none"}}/>;
}

// ─── Petals ───
function Petals() {
  const petals = Array.from({length:18},(_,i)=>({
    id:i, emoji:["🌸","🌹","💮","🏵️","🌺"][i%5],
    left:`${(i*5.5)%100}%`, delay:`${(i*.4)%7}s`, dur:`${7+(i%5)}s`, size:`${16+(i%3)*8}px`,
  }));
  return petals.map(p=>(
    <div key={p.id} style={{position:"fixed",left:p.left,top:"-60px",fontSize:p.size,zIndex:0,
      animation:`petalFall ${p.dur} ${p.delay} infinite linear, sway ${p.dur} ${p.delay} infinite ease-in-out`,
      pointerEvents:"none"}}>{p.emoji}</div>
  ));
}

// ─── CountdownBox ───
function CountdownBox({ label, value }) {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{background:"linear-gradient(135deg,#C41E5C,#7c0a39)",borderRadius:12,padding:"10px 16px",minWidth:60,
        fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:"#fff",boxShadow:"0 4px 20px #C41E5c44",textAlign:"center"}}>
        {String(value).padStart(2,"0")}
      </div>
      <div style={{fontSize:11,color:"#a0637a",marginTop:4,fontWeight:600,letterSpacing:1}}>{label.toUpperCase()}</div>
    </div>
  );
}

// ─── Calendar ───
function Calendar({ selected, onChange }) {
  const today = new Date(), minYear = today.getFullYear();
  const initMonth = today.getMonth() < 9 ? 9 : today.getMonth();
  const [viewY, setViewY] = useState(minYear);
  const [viewM, setViewM] = useState(initMonth);
  const isDisabled = (y,m,d) => {
    if(m<9) return true;
    if(m===9 && d<15) return true;
    const dt = new Date(y,m,d), now = new Date(); now.setHours(0,0,0,0);
    return dt < now;
  };
  const prevMonth = () => {
    if(viewM===9 && viewY===minYear) return;
    if(viewM===0){setViewM(11);setViewY(y=>y-1);} else setViewM(m=>m-1);
  };
  const nextMonth = () => { if(viewM===11){setViewM(0);setViewY(y=>y+1);} else setViewM(m=>m+1); };
  const days = getDaysInMonth(viewY,viewM), first = getFirstDay(viewY,viewM);
  const selDate = selected ? new Date(selected+"T12:00:00") : null;
  const atMin = viewM===9 && viewY===minYear;
  return (
    <div style={{background:"#fff",borderRadius:20,padding:20,boxShadow:"0 8px 40px #C41E5c22",border:"2px solid #f5c6d9"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={prevMonth} disabled={atMin} style={{background:"none",border:"none",fontSize:22,cursor:atMin?"not-allowed":"pointer",color:atMin?"#ccc":"#C41E5C",padding:"4px 10px"}}>‹</button>
        <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#2D0A1F"}}>{MONTHS[viewM]} {viewY}</span>
        <button onClick={nextMonth} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#C41E5C",padding:"4px 10px"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#C41E5C",padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {Array.from({length:first}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:days},(_,i)=>i+1).map(d=>{
          const disabled = isDisabled(viewY,viewM,d);
          const dateStr = `${viewY}-${String(viewM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const isSel = selDate && selDate.getFullYear()===viewY && selDate.getMonth()===viewM && selDate.getDate()===d;
          return (
            <button key={d} onClick={()=>!disabled&&onChange(dateStr)} disabled={disabled} style={{
              border:"none",borderRadius:10,padding:"8px 4px",cursor:disabled?"not-allowed":"pointer",
              fontWeight:isSel?800:500,fontSize:14,
              background:isSel?"linear-gradient(135deg,#C41E5C,#7c0a39)":disabled?"#f5f5f5":"transparent",
              color:isSel?"#fff":disabled?"#ccc":"#2D0A1F",
              transform:isSel?"scale(1.15)":"scale(1)",boxShadow:isSel?"0 4px 14px #C41E5c55":"none",transition:"all .15s",
            }}>{d}</button>
          );
        })}
      </div>
      <p style={{fontSize:11,color:"#a0637a",textAlign:"center",marginTop:12}}>📅 Dates before October 15 are unavailable</p>
    </div>
  );
}

// ─── Wedding Card ───
function WeddingCard({ dateStr }) {
  const date = new Date(dateStr+"T12:00:00");
  const formatted = date.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const corners = [{top:12,left:12},{top:12,right:12},{bottom:12,left:12},{bottom:12,right:12}];
  return (
    <div style={{background:"linear-gradient(145deg,#fff9fb,#fff0f5)",border:"3px double #D4AF37",borderRadius:24,
      padding:"40px 32px",textAlign:"center",position:"relative",overflow:"hidden",boxShadow:"0 20px 60px #C41E5c22",maxWidth:540,margin:"0 auto"}}>
      {corners.map((c,i)=><div key={i} style={{position:"absolute",...c,fontSize:28,opacity:.7}}>🌹</div>)}
      <div style={{position:"absolute",inset:10,border:"1px solid #D4AF3766",borderRadius:18,pointerEvents:"none"}}/>
      <div style={{fontSize:40,marginBottom:8,lineHeight:1}}>💍</div>
      <p style={{fontFamily:"'Playfair Display',serif",fontSize:13,letterSpacing:4,color:"#a0637a",textTransform:"uppercase",marginBottom:4}}>Together Forever</p>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700,background:"linear-gradient(135deg,#C41E5C,#D4AF37)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"12px 0"}}>Mubshar &amp; Sadia</h2>
      <div style={{width:60,height:2,background:"linear-gradient(90deg,transparent,#D4AF37,transparent)",margin:"0 auto 16px"}}/>
      <p style={{fontFamily:"'Playfair Display',serif",color:"#a0637a",fontSize:14,marginBottom:4}}>cordially invite you to celebrate</p>
      <p style={{fontFamily:"'Playfair Display',serif",color:"#a0637a",fontSize:14,marginBottom:20}}>their Wedding Ceremony</p>
      <div style={{background:"linear-gradient(135deg,#C41E5C,#7c0a39)",borderRadius:14,padding:"14px 24px",display:"inline-block",marginBottom:20,boxShadow:"0 6px 24px #C41E5c44"}}>
        <p style={{color:"rgba(255,255,255,.8)",fontSize:11,letterSpacing:3,marginBottom:2}}>WEDDING DATE</p>
        <p style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:20,fontWeight:700}}>{formatted}</p>
      </div>
      <p style={{fontFamily:"'Playfair Display',serif",fontStyle:"italic",color:"#a0637a",fontSize:13,marginBottom:20,lineHeight:1.7}}>"Love is composed of a single soul<br/>inhabiting two bodies."</p>
      <div style={{width:60,height:1,background:"linear-gradient(90deg,transparent,#D4AF37,transparent)",margin:"0 auto 16px"}}/>
      <p style={{fontSize:11,color:"#cba0b5",letterSpacing:2}}>WITH LOVE &amp; BLESSINGS ✨</p>
    </div>
  );
}

// ─── Main App ───
function ProposalApp() {
  const [stage, setStage] = useState("proposal");
  const [confetti, setConfetti] = useState(false);
  const [selected, setSelected] = useState("");
  const [noPos, setNoPos] = useState({x:0,y:0});
  const [noMoved, setNoMoved] = useState(0);
  const [countdown, setCountdown] = useState(null);
  const [weddingEmailStatus, setWeddingEmailStatus] = useState(null);
  const [noEmailStatus, setNoEmailStatus] = useState(null);
  const [noEmailSent, setNoEmailSent] = useState(false);

  useEffect(() => {
    if(stage!=="card"||!selected) return;
    const t = setInterval(()=>setCountdown(getCountdown(selected)),1000);
    setCountdown(getCountdown(selected));
    return ()=>clearInterval(t);
  },[stage,selected]);

  useEffect(() => {
    if(stage!=="card"||!selected) return;
    const date = new Date(selected+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    setWeddingEmailStatus("sending");
    sendEmail({subject:"💍 Wedding Card — Mubshar & Sadia",
      body:`Assalam-o-Alaikum Mubshar!\n\nGreat news — Sadia said YES! 🎉💍\n\nWedding Details:\n👫 Couple: Mubshar & Sadia\n📅 Date: ${date}\n\n"Love is composed of a single soul inhabiting two bodies."\n\nWith Love & Blessings 🌹`,
    }).then(ok=>setWeddingEmailStatus(ok?"sent":"failed"));
  },[stage,selected]);

  const dodgeNo = useCallback(()=>{
    const vw = window.innerWidth-130, vh = window.innerHeight-60;
    setNoPos({x:Math.random()*vw,y:Math.random()*vh});
    setNoMoved(n=>n+1);
  },[]);

  const handleMaybeLater = useCallback(()=>{
    dodgeNo();
    if(noEmailSent) return;
    setNoEmailSent(true);
    setNoEmailStatus("sending");
    sendEmail({subject:"💔 She Said Maybe Later… — Proposal Update",
      body:`Assalam-o-Alaikum Mubshar,\n\nSadia pressed "Maybe Later" on your proposal. 😔\n\nDon't give up! True love is worth waiting for. 💪\n\nProposed on: ${new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})}\n\nKeep your head up — the right moment will come! 🌹\n\nWith Love,\nProposal App`,
    }).then(ok=>setNoEmailStatus(ok?"sent":"failed"));
  },[noEmailSent,dodgeNo]);

  const handleYes = ()=>{
    setConfetti(true);
    setTimeout(()=>setConfetti(false),5000);
    setTimeout(()=>setStage("date"),1800);
  };

  const resendWeddingEmail = ()=>{
    const date = new Date(selected+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    setWeddingEmailStatus("sending");
    sendEmail({subject:"💍 Wedding Card Resent — Mubshar & Sadia",
      body:`Assalam-o-Alaikum Mubshar!\n\nResending your wedding card:\n\n👫 Mubshar & Sadia\n📅 ${date}\n\nWith Love & Blessings 🌹`,
    }).then(ok=>setWeddingEmailStatus(ok?"sent":"failed"));
  };

  const resetAll = ()=>{
    setStage("proposal"); setSelected(""); setNoMoved(0); setNoPos({x:0,y:0});
    setWeddingEmailStatus(null); setNoEmailStatus(null); setNoEmailSent(false);
  };

  const base = {minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",
    fontFamily:"'Lato',sans-serif",position:"relative",overflow:"hidden",
    background:"linear-gradient(135deg,#2D0A1F 0%,#5c1033 40%,#2D0A1F 100%)"};

  // PROPOSAL
  if(stage==="proposal") return (
    <div style={base}>
      <Petals/>
      <Confetti active={confetti}/>
      <div style={{background:"rgba(255,255,255,.06)",backdropFilter:"blur(20px)",border:"1px solid rgba(212,175,55,.3)",
        borderRadius:32,padding:"52px 44px",maxWidth:520,width:"100%",textAlign:"center",position:"relative",zIndex:10,animation:"glow 3s ease-in-out infinite"}}>
        <div style={{fontSize:72,animation:"ringFloat 3s ease-in-out infinite",display:"inline-block",marginBottom:20}}>💍</div>
        <p style={{fontSize:12,letterSpacing:5,color:"#D4AF37",textTransform:"uppercase",marginBottom:12}}>A Heartfelt Proposal</p>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(32px,8vw,52px)",fontWeight:900,color:"#fff",lineHeight:1.1,marginBottom:20}}>
          Will You<br/>
          <span style={{background:"linear-gradient(90deg,#C41E5C,#D4AF37,#C41E5C)",backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"shimmer 3s linear infinite"}}>Marry Me?</span>
        </h1>
        <p style={{color:"rgba(255,255,255,.7)",lineHeight:1.8,fontSize:15,marginBottom:32}}>
          Dear <strong style={{color:"#D4AF37"}}>Sadia</strong>, you are the light of my life,<br/>
          my best friend, my forever. Every day with you<br/>feels like a beautiful dream I never want to wake from.
        </p>
        <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={handleYes} style={{background:"linear-gradient(135deg,#C41E5C,#D4AF37)",border:"none",borderRadius:50,padding:"16px 36px",color:"#fff",fontSize:18,fontWeight:700,cursor:"pointer",boxShadow:"0 8px 30px #C41E5c66",animation:"btnPulse 2s ease-in-out infinite",letterSpacing:1}}>💍 Yes, I Will!</button>
          <button onMouseEnter={handleMaybeLater} onFocus={handleMaybeLater} onClick={handleMaybeLater}
            style={{position:noMoved>0?"fixed":"relative",left:noMoved>0?noPos.x:"auto",top:noMoved>0?noPos.y:"auto",
            background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",borderRadius:50,padding:"16px 36px",
            color:"rgba(255,255,255,.7)",fontSize:18,fontWeight:700,cursor:"pointer",transition:"left .2s ease, top .2s ease",letterSpacing:1,zIndex:999,backdropFilter:"blur(10px)"}}>
            {noMoved===0?"Go to Hell":noMoved<3?"Allah Hafiz!":noMoved<6?"No means no! 🏃":noMoved<9?"I'm running! 😂":"You can't catch me! 🤣"}
          </button>
        </div>
        {noEmailStatus && (
          <div style={{marginTop:20,animation:"slideUp .4s ease"}}>
            <EmailBadge status={noEmailStatus}/>
            {noEmailStatus==="sent" && <p style={{color:"rgba(255,255,255,.45)",fontSize:12,marginTop:8,animation:"fadeIn .6s ease"}}>📩 Mubshar has been notified that she said "Maybe Later"</p>}
          </div>
        )}
        {noMoved>0 && (
          <p style={{color:"rgba(255,255,255,.35)",fontSize:12,marginTop:10}}>
            {noMoved<4?"😏 The button is escaping…":noMoved<8?"🎯 Click Yes instead! 😄":"🏆 Love is persistent — click Yes!"}
          </p>
        )}
      </div>
    </div>
  );

  // DATE
  if(stage==="date") return (
    <div style={base}>
      <Petals/>
      <div style={{background:"rgba(255,255,255,.07)",backdropFilter:"blur(24px)",border:"1px solid rgba(212,175,55,.3)",borderRadius:32,padding:"44px 36px",maxWidth:500,width:"100%",position:"relative",zIndex:10}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:8}}>🎉</div>
          <p style={{fontSize:12,letterSpacing:5,color:"#D4AF37",textTransform:"uppercase",marginBottom:8}}>She Said Yes!</p>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:34,fontWeight:900,color:"#fff",marginBottom:8}}>Set the Date</h2>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:14}}>Choose your perfect wedding day ✨</p>
        </div>
        <Calendar selected={selected} onChange={setSelected}/>
        {selected && (
          <div style={{marginTop:20,padding:"14px 20px",background:"rgba(212,175,55,.15)",border:"1px solid rgba(212,175,55,.4)",borderRadius:14,textAlign:"center"}}>
            <p style={{color:"#D4AF37",fontWeight:700,fontSize:15}}>📅 {new Date(selected+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
          </div>
        )}
        <button onClick={()=>selected&&setStage("card")} disabled={!selected} style={{marginTop:20,width:"100%",
          background:selected?"linear-gradient(135deg,#C41E5C,#D4AF37)":"rgba(255,255,255,.1)",border:"none",borderRadius:50,padding:"16px",color:"#fff",fontSize:16,fontWeight:700,cursor:selected?"pointer":"not-allowed",opacity:selected?1:.5,transition:"all .3s"}}>
          Generate Wedding Card &amp; Send Email →
        </button>
      </div>
    </div>
  );

  // CARD
  return (
    <div style={{...base,alignItems:"flex-start",paddingTop:40}}>
      <Petals/>
      <div style={{maxWidth:600,width:"100%",position:"relative",zIndex:10,display:"flex",flexDirection:"column",gap:24}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:40}}>🎊</div>
          <p style={{fontSize:12,letterSpacing:5,color:"#D4AF37",textTransform:"uppercase",marginTop:8}}>Your Wedding Card</p>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:900,color:"#fff",marginTop:4}}>Mubshar &amp; Sadia</h2>
        </div>
        {weddingEmailStatus && <EmailBadge status={weddingEmailStatus}/>}
        <WeddingCard dateStr={selected}/>
        {countdown && (
          <div style={{background:"rgba(255,255,255,.06)",backdropFilter:"blur(20px)",border:"1px solid rgba(212,175,55,.3)",borderRadius:20,padding:"20px 16px",textAlign:"center"}}>
            <p style={{color:"rgba(255,255,255,.6)",fontSize:12,letterSpacing:3,textTransform:"uppercase",marginBottom:14}}>Counting Down to the Big Day</p>
            <div style={{display:"flex",justifyContent:"center",gap:12}}>
              <CountdownBox label="Days" value={countdown.d}/>
              <CountdownBox label="Hours" value={countdown.h}/>
              <CountdownBox label="Minutes" value={countdown.m}/>
              <CountdownBox label="Seconds" value={countdown.s}/>
            </div>
          </div>
        )}
        <div style={{background:"rgba(255,255,255,.06)",backdropFilter:"blur(20px)",border:"1px solid rgba(212,175,55,.3)",borderRadius:20,padding:"24px",display:"flex",flexDirection:"column",gap:12}}>
          <button onClick={resendWeddingEmail} style={{background:"linear-gradient(135deg,#C41E5C,#D4AF37)",border:"none",borderRadius:50,padding:"16px",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 8px 28px #C41E5c44",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>✉️ Resend to me.mubshar@gmail.com</button>
          <button onClick={()=>openMailto({subject:"💍 Wedding Card — Mubshar & Sadia",body:`Assalam-o-Alaikum Mubshar!\n\nSadia said YES! 🎉💍\n\n👫 Mubshar & Sadia\n📅 ${new Date(selected+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}\n\nWith Love & Blessings 🌹`})} style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.25)",borderRadius:50,padding:"14px",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>📧 Open in my email app (backup)</button>
          <button onClick={()=>window.print()} style={{background:"rgba(212,175,55,.2)",border:"1px solid rgba(212,175,55,.5)",borderRadius:50,padding:"14px",color:"#D4AF37",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>🖨️ Print Wedding Card</button>
          <button onClick={resetAll} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:50,padding:"12px",color:"rgba(255,255,255,.5)",fontSize:14,cursor:"pointer"}}>↩ Start Over</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProposalApp/>);
</script>
</body>
</html>
